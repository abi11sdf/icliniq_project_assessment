# ─── CI Pipeline ────────────────────────────────────────
# Triggers on every push and pull request
# Steps: lint → test → security scan → docker build → terraform validate

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_REPO: assessment-app
  IMAGE_NAME: app

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run ESLint
        working-directory: app
        run: npm run lint

      - name: Run Jest tests with coverage
        working-directory: app
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  # ── Job 2: Docker Build & Security Scan ───────────────
  docker-build-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: lint-and-test   # only runs if lint & test pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image locally for scanning
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"           # fail CI if CRITICAL vulnerabilities found
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true     # ignore vulns with no fix available yet

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()               # upload even if scan fails
        with:
          name: trivy-results
          path: trivy-results.sarif

  # ── Job 3: Push to Artifact Registry ──────────────────
  push-image:
    name: Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: docker-build-scan   # only push if scan passes

    permissions:
      contents: read
      id-token: write            # required for OIDC Workload Identity

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          # No JSON key needed — OIDC token exchanged for short-lived GCP token

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push image to GAR
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

          docker build -t $IMAGE_URL:${{ github.sha }} \
                       -t $IMAGE_URL:latest .

          docker push $IMAGE_URL:${{ github.sha }}
          docker push $IMAGE_URL:latest

          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

  # ── Job 4: Terraform Validate ─────────────────────────
  terraform-validate:
    name: Terraform Fmt & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (backend disabled for validation)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint
